<!DOCTYPE html>
<html>
<head><title>Logo Generator</title></head>
<body>
<canvas id="c"></canvas>
<script>
const SIZE = 512;
const c = document.getElementById('c');
c.width = SIZE; c.height = SIZE;
const ctx = c.getContext('2d');

// Green gradient rounded square background
const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
grad.addColorStop(0, '#1A3328');
grad.addColorStop(1, '#2E5C44');

const r = 112; // corner radius
ctx.beginPath();
ctx.moveTo(r, 0);
ctx.lineTo(SIZE - r, 0);
ctx.quadraticCurveTo(SIZE, 0, SIZE, r);
ctx.lineTo(SIZE, SIZE - r);
ctx.quadraticCurveTo(SIZE, SIZE, SIZE - r, SIZE);
ctx.lineTo(r, SIZE);
ctx.quadraticCurveTo(0, SIZE, 0, SIZE - r);
ctx.lineTo(0, r);
ctx.quadraticCurveTo(0, 0, r, 0);
ctx.closePath();
ctx.fillStyle = grad;
ctx.fill();

// 4 large white petals centered
ctx.save();
ctx.translate(SIZE / 2, SIZE / 2);

const angles = [0, 45, 90, 135];
angles.forEach(angleDeg => {
  const rad = (angleDeg * Math.PI) / 180;
  ctx.save();
  ctx.rotate(rad);
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.ellipse(0, 0, 100, 200, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.restore();
});

ctx.restore();

// Download
const link = document.createElement('a');
link.download = 'guided-logo.png';
link.href = c.toDataURL('image/png');
link.click();
document.body.innerHTML = '<p style="font-family:sans-serif;padding:20px">✅ Download started — <strong>guided-logo.png</strong><br><br><a href="' + link.href + '" download="guided-logo.png">Click here if it didn\'t download</a></p>';
</script>
</body>
</html>
